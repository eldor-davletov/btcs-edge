spring:
  application:
    name: btcs-edge-test

  datasource:
    url: jdbc:h2:mem:btcstest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false

vaadin:
  launch-browser: false
